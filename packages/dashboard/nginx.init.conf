# Temporary config used ONLY during initial SSL certificate setup.
# Once certs are obtained, the real nginx.conf takes over.
server {
    listen 80;
    server_name bhashajs.tech www.bhashajs.tech;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://server:5000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
